services:
  postgres:
    image: postgres:18-alpine
    container_name: doc-classifier-postgres
    environment:
      POSTGRES_DB: doc_classifier
      POSTGRES_USER: doc_classifier
      POSTGRES_PASSWORD: doc_classifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc_classifier -d doc_classifier"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: doc-classifier-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://doc_classifier:doc_classifier@postgres:5432/doc_classifier
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  postgres_data:
