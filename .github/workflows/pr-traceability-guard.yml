name: PR Traceability Guard

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main]

jobs:
  closing-keyword-required:
    name: Closing Keyword Required
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body has closing keyword
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if echo "${PR_BODY}" | grep -Eiq '\b(closes|closed|fixes|fixed|resolves|resolved)\s+#([0-9]+)\b'; then
            echo "Traceability check passed: closing keyword found."
            exit 0
          fi

          echo "Traceability check failed: add a closing keyword in PR body."
          echo "Example: Closes #53"
          exit 1
