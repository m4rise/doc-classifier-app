name: Deploy Production

# Production deploy is release-controlled. It runs when a GitHub Release is
# published, or manually for an explicit ref/tag/SHA.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref, tag, or SHA to deploy. Leave empty to use the selected workflow ref."
        required: false
        type: string
      deploy_backend:
        description: "Deploy backend to Cloud Run"
        required: false
        default: true
        type: boolean
      deploy_frontend:
        description: "Deploy frontend to Firebase Hosting"
        required: false
        default: true
        type: boolean

concurrency:
  group: production-deploy-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve deploy target
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      deploy_backend: ${{ steps.resolve.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.resolve.outputs.deploy_frontend }}
    steps:
      - name: Resolve ref and components
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_REF: ${{ inputs.ref }}
          DEFAULT_REF: ${{ github.ref_name }}
          INPUT_DEPLOY_BACKEND: ${{ inputs.deploy_backend }}
          INPUT_DEPLOY_FRONTEND: ${{ inputs.deploy_frontend }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            deploy_ref="$RELEASE_TAG"
            deploy_backend="true"
            deploy_frontend="true"
          else
            deploy_ref="${INPUT_REF:-$DEFAULT_REF}"
            deploy_backend="${INPUT_DEPLOY_BACKEND:-true}"
            deploy_frontend="${INPUT_DEPLOY_FRONTEND:-true}"
          fi

          if [ -z "$deploy_ref" ]; then
            echo "No deploy ref could be resolved."
            exit 1
          fi

          echo "ref=$deploy_ref" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=$deploy_backend" >> "$GITHUB_OUTPUT"
          echo "deploy_frontend=$deploy_frontend" >> "$GITHUB_OUTPUT"

          {
            echo "### Production deploy target"
            echo ""
            echo "- Ref: $deploy_ref"
            echo "- Backend: $deploy_backend"
            echo "- Frontend: $deploy_frontend"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Backend - Prisma migrate -> Docker build+push -> Cloud Run deploy
  # Secrets required (GitHub Actions):
  #   WIF_PROVIDER, WIF_SERVICE_ACCOUNT  - GCP OIDC auth (no JSON key)
  #   DATABASE_URL_PROD                  - Neon prod connection string (migrations)
  # Variables required (GitHub Actions vars.*):
  #   GCP_PROJECT_ID, GCP_REGION         - GCP project and region
  #   CLOUD_RUN_SERVICE                  - Cloud Run service name
  #   GCS_BUCKET_NAME                    - GCS bucket name (non-sensitive)
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.deploy_backend == 'true'
    environment: production-backend
    permissions:
      contents: read
      id-token: write # required for WIF OIDC

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Resolve checked out SHA
        id: git
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Authenticate to GCP (OIDC)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/backend/doc-classifier-backend:${{ steps.git.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/backend/doc-classifier-backend:${{ steps.git.outputs.sha }}
          # Allow unauthenticated invocations - Cloud Run IAM is not the auth layer.
          # Application-level JWT auth (NestJS Guards) handles request authentication.
          flags: --allow-unauthenticated
          # Secrets from GCP Secret Manager - injected as env vars at runtime.
          # Format: ENV_VAR_NAME=secret-resource-name:version
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            JWT_ACCESS_SECRET=JWT_ACCESS_SECRET:latest
            JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest
            AES_ENCRYPTION_KEY=AES_ENCRYPTION_KEY:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            MCP_API_KEY=MCP_API_KEY:latest
            SENTRY_DSN=SENTRY_DSN:latest
            OTEL_EXPORTER_OTLP_ENDPOINT=OTEL_EXPORTER_OTLP_ENDPOINT:latest
            GRAFANA_INSTANCE_ID=GRAFANA_INSTANCE_ID:latest
            GRAFANA_API_KEY=GRAFANA_API_KEY:latest
          # Non-sensitive config - passed as plain env vars.
          env_vars_update_strategy: overwrite
          env_vars: |
            NODE_ENV=production
            PRISMA_POOL_MAX=2
            PRISMA_POOL_CONNECTION_TIMEOUT_MS=10000
            JWT_ACCESS_TOKEN_TTL_SECONDS=900
            JWT_REFRESH_TOKEN_TTL_SECONDS=604800
            ARGON2_TIME_COST=3
            ARGON2_MEMORY_COST_KIB=19456
            ARGON2_PARALLELISM=1
            FILE_STORAGE_DRIVER=gcs
            GCS_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}
            DOCUMENT_DOWNLOAD_URL_TTL_SECONDS=900
            DOCUMENT_LIST_DEFAULT_LIMIT=20
            DOCUMENT_LIST_MAX_LIMIT=100
            GEMINI_MODEL=gemini-3.5-flash
            GEMINI_TIMEOUT_MS=8000
            OTEL_SERVICE_NAME=doc-classifier-app-backend
            OTEL_RESOURCE_ATTRIBUTES="service.namespace=production,deployment.environment=production"
            OTEL_TRACES_EXPORTER=otlp
            OTEL_METRICS_EXPORTER=otlp
            OTEL_LOGS_EXPORTER=otlp
            THROTTLE_TTL=60
            THROTTLE_LIMIT=100
            THROTTLE_AUTH_TTL=60
            THROTTLE_AUTH_LIMIT=10
            THROTTLE_AUTH_SESSION_TTL=60
            THROTTLE_AUTH_SESSION_LIMIT=60
            THROTTLE_REGISTER_TTL=60
            THROTTLE_REGISTER_LIMIT=5
            THROTTLE_UPLOAD_TTL=60
            THROTTLE_UPLOAD_LIMIT=10
            CONFIDENCE_THRESHOLD=0.7
            FILE_SIZE_LIMIT_MB=10
            TOS_VERSION=1.0

  # ---------------------------------------------------------------------------
  # Frontend - Build Vue SPA -> Firebase Hosting deploy
  # No service account JSON needed - uses WIF (same SA as backend).
  # The github-actions SA has "Administrateur Firebase Hosting" role.
  # Firebase CLI picks up Application Default Credentials set by auth@v3.
  # Variables required (GitHub Actions vars.*):
  #   FIREBASE_PROJECT_ID       - Firebase project ID
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.deploy_frontend == 'true'
    environment: production-frontend
    permissions:
      contents: read
      id-token: write # required for WIF OIDC

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Authenticate to GCP (OIDC)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project ${{ vars.FIREBASE_PROJECT_ID }}
        working-directory: frontend
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
