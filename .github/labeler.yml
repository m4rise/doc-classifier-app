# Labeler configuration for actions/labeler@v5
# Automatically adds labels to PRs based on changed files

backend:
  - changed-files:
    - any-glob-to-any-file: 'backend/**'

frontend:
  - changed-files:
    - any-glob-to-any-file: 'frontend/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '**/*.md'

ci-cd:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/**'
      - '.github/actions/**'

infra:
  - changed-files:
    - any-glob-to-any-file:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - '**/package.json'
      - '**/package-lock.json'
      - 'renovate.json'

test:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.spec.*'
      - '**/*.test.*'
      - '**/test/**'
      - '**/e2e/**'

security:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/SECURITY.md'
      - '**/auth/**'
