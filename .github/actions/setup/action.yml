name: Setup Node Environment
description: >
  Composite action: installs Node (via mise) and configures npm cache.
  Must be called after actions/checkout.

inputs:
  cache-dependency-path:
    description: Path(s) to package-lock.json files used as npm cache key
    required: false
    default: backend/package-lock.json

runs:
  using: composite
  steps:
    - name: Setup mise + tools
      uses: jdx/mise-action@v4
      with:
        install: true
        cache: true

    - name: Setup Node cache (npm)
      uses: actions/setup-node@v6
      with:
        cache: npm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Verify environment
      shell: bash
      run: |
        echo "Node: $(node -v)"
        echo "NPM: $(npm -v)"
